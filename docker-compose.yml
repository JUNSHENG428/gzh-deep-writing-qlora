# ============================================================
# 公众号深度写作模型 API —— 一键起服务
# 前置要求：
#   - NVIDIA 驱动 + nvidia-container-toolkit（Windows 走 WSL2 后端）
#   - 已合并的模型放在 ./models/qwen25-7b-gzh-merged
# 启动：docker compose up -d
# 调用：curl http://localhost:8010/health
# ============================================================
services:
  gzh-writer:
    build:
      context: .
      dockerfile: serve/Dockerfile
    image: gzh-writer:latest
    container_name: gzh-writer
    ports:
      - "8010:8000"          # 宿主机 8010 -> 容器 8000（宿主 8000 已被占用）
    volumes:
      - ./models:/models:ro  # 模型只读挂载，不打进镜像
    environment:
      - MODEL_PATH=/models/qwen25-7b-gzh-merged
      - LOAD_4BIT=1          # 4bit 量化加载，约 6GB 显存
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
